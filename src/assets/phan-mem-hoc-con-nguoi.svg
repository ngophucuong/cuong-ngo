<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 480" width="480" height="480">
  <!-- Background -->
  <rect width="480" height="480" fill="#ede8de" rx="6"/>

  <!-- Subtle grid lines (machine side) -->
  <g stroke="#c8bfb0" stroke-width="0.5" opacity="0.6">
    <line x1="260" y1="20" x2="260" y2="460"/>
    <line x1="300" y1="20" x2="300" y2="460"/>
    <line x1="340" y1="20" x2="340" y2="460"/>
    <line x1="380" y1="20" x2="380" y2="460"/>
    <line x1="420" y1="20" x2="420" y2="460"/>
    <line x1="460" y1="20" x2="460" y2="460"/>
    <line x1="240" y1="60"  x2="480" y2="60"/>
    <line x1="240" y1="100" x2="480" y2="100"/>
    <line x1="240" y1="140" x2="480" y2="140"/>
    <line x1="240" y1="180" x2="480" y2="180"/>
    <line x1="240" y1="220" x2="480" y2="220"/>
    <line x1="240" y1="260" x2="480" y2="260"/>
    <line x1="240" y1="300" x2="480" y2="300"/>
    <line x1="240" y1="340" x2="480" y2="340"/>
    <line x1="240" y1="380" x2="480" y2="380"/>
    <line x1="240" y1="420" x2="480" y2="420"/>
  </g>

  <!-- Human hand (left, organic, warm ink) -->
  <!-- Palm -->
  <ellipse cx="155" cy="310" rx="72" ry="58" fill="#2a2320" opacity="0.88"/>
  <!-- Thumb -->
  <ellipse cx="90" cy="270" rx="22" ry="38" fill="#2a2320" opacity="0.88" transform="rotate(-20 90 270)"/>
  <!-- Index finger -->
  <rect x="118" y="165" width="28" height="100" rx="14" fill="#2a2320" opacity="0.88"/>
  <!-- Middle finger (longest, reaching center) -->
  <rect x="152" y="148" width="28" height="118" rx="14" fill="#2a2320" opacity="0.88"/>
  <!-- Ring finger -->
  <rect x="186" y="162" width="26" height="104" rx="13" fill="#2a2320" opacity="0.88"/>
  <!-- Little finger -->
  <rect x="217" y="185" width="22" height="84" rx="11" fill="#2a2320" opacity="0.88"/>
  <!-- Fingertip highlight (touch point glow) -->
  <circle cx="166" cy="150" r="10" fill="#9a3b1f" opacity="0.7"/>

  <!-- Machine hand (right, geometric, structured) -->
  <!-- Palm — rectangular -->
  <rect x="255" y="272" width="130" height="96" rx="6" fill="#3d5c4a" opacity="0.85"/>
  <!-- Circuit details on palm -->
  <line x1="270" y1="295" x2="370" y2="295" stroke="#6a9b7e" stroke-width="1.5" opacity="0.6"/>
  <line x1="270" y1="315" x2="370" y2="315" stroke="#6a9b7e" stroke-width="1.5" opacity="0.6"/>
  <line x1="270" y1="335" x2="340" y2="335" stroke="#6a9b7e" stroke-width="1.5" opacity="0.6"/>
  <circle cx="310" cy="315" r="4" fill="#6a9b7e" opacity="0.8"/>
  <circle cx="280" cy="295" r="3" fill="#6a9b7e" opacity="0.8"/>
  <circle cx="350" cy="335" r="3" fill="#6a9b7e" opacity="0.8"/>
  <!-- Index finger — rectangular -->
  <rect x="262" y="172" width="24" height="106" rx="4" fill="#3d5c4a" opacity="0.85"/>
  <!-- Middle finger (reaching center) -->
  <rect x="292" y="152" width="24" height="126" rx="4" fill="#3d5c4a" opacity="0.85"/>
  <!-- Ring finger -->
  <rect x="322" y="168" width="24" height="110" rx="4" fill="#3d5c4a" opacity="0.85"/>
  <!-- Little finger -->
  <rect x="352" y="190" width="20" height="88" rx="4" fill="#3d5c4a" opacity="0.85"/>
  <!-- Thumb — diagonal -->
  <rect x="372" y="268" width="36" height="22" rx="10" fill="#3d5c4a" opacity="0.85" transform="rotate(15 372 268)"/>
  <!-- Fingertip highlight (touch point) -->
  <circle cx="304" cy="154" r="10" fill="#9a3b1f" opacity="0.7"/>

  <!-- Connection / touch glow between the two fingertips -->
  <circle cx="235" cy="152" r="22" fill="#9a3b1f" opacity="0.12"/>
  <circle cx="235" cy="152" r="12" fill="#9a3b1f" opacity="0.18"/>
  <circle cx="235" cy="152" r="5"  fill="#9a3b1f" opacity="0.7"/>

  <!-- Caption -->
  <text x="240" y="454" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#7a6e64" letter-spacing="0.08em">CON NGƯỜI  ·  MÁY MÓC</text>
</svg>
